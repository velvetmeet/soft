<!doctype html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#f3ede4">
<title id="docTitle">VelvetMeet — 18+</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;width:100%;overflow-x:hidden}
body{
  font-family:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
  background:#f3ede4;
  color:#1e1a16;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  display:flex;
  flex-direction:column;
  min-height:100vh;
  min-height:100dvh;
}

.bg{
  position:fixed;
  inset:0;
  background:
    linear-gradient(180deg, rgba(243,237,228,.35) 0%, rgba(243,237,228,.65) 100%),
    url("images/bg.jpg") center/cover no-repeat;
  z-index:0;
}

main{
  position:relative;
  z-index:1;
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px 18px;
}

.card{
  background:#fffaf3;
  border-radius:24px;
  padding:36px 30px 30px;
  width:100%;
  max-width:440px;
  box-shadow:0 14px 50px rgba(40,30,20,.16), 0 2px 8px rgba(40,30,20,.06);
  text-align:center;
  animation:appear .6s ease;
}
@keyframes appear{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

.eyebrow{
  display:inline-block;
  font-size:11px;
  letter-spacing:.18em;
  font-weight:600;
  color:#b8742a;
  border:1px solid #e6dccb;
  border-radius:100px;
  padding:5px 12px;
  margin-bottom:20px;
  text-transform:uppercase;
}

h1{
  font-family:"Lora",serif;
  font-size:26px;
  line-height:1.3;
  font-weight:600;
  letter-spacing:-.01em;
  color:#1e1a16;
  margin-bottom:14px;
}

.sub{
  font-size:15px;
  color:#5c544a;
  margin-bottom:28px;
}

.btn{
  display:block;
  width:100%;
  background:#b8742a;
  color:#fff;
  font-family:"Inter",sans-serif;
  font-size:16px;
  font-weight:600;
  letter-spacing:.01em;
  padding:17px 22px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  transition:background .15s,transform .15s;
  text-decoration:none;
  text-align:center;
}
.btn:hover{background:#a0631f}
.btn:active{transform:scale(.98)}

.micro{
  font-size:12.5px;
  color:#7a7269;
  margin-top:14px;
  margin-bottom:24px;
}
.micro span{margin:0 4px}

footer{
  position:relative;
  z-index:1;
  padding:18px 18px calc(18px + env(safe-area-inset-bottom));
  text-align:center;
  font-size:12px;
  color:#7a7269;
}
footer a{color:#7a7269;text-decoration:none;margin:0 8px;border-bottom:1px solid transparent}
footer a:hover{border-color:#7a7269}
.footer-copy{display:block;margin-bottom:6px}

.lang{
  position:absolute;
  top:18px;
  right:18px;
  z-index:2;
}
.lang select{
  appearance:none;-webkit-appearance:none;
  background:rgba(255,250,243,.85);
  border:1px solid #e6dccb;
  border-radius:10px;
  padding:6px 28px 6px 12px;
  font:inherit;
  font-size:13px;
  color:#1e1a16;
  cursor:pointer;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%237a7269' d='M0 0l5 6 5-6z'/></svg>");
  background-repeat:no-repeat;
  background-position:right 8px center;
}

.cookie{
  position:fixed;
  bottom:14px;left:14px;right:14px;
  background:#1e1a16;
  color:#f3ede4;
  border-radius:14px;
  padding:14px 16px;
  z-index:5;
  font-size:13px;
  display:none;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  box-shadow:0 6px 24px rgba(0,0,0,.2);
}
.cookie button{
  background:#b8742a;
  border:none;
  color:#fff;
  font:inherit;font-size:13px;font-weight:600;
  padding:9px 16px;
  border-radius:10px;
  cursor:pointer;
  flex-shrink:0;
}

@media(min-width:520px){
  .card{padding:44px 40px 36px}
  h1{font-size:30px}
}
@media(max-width:380px){
  h1{font-size:23px}
  .sub{font-size:14px}
}
@media(max-width:520px){
  .lang{display:none}
}
</style>
</head>
<body>

<div class="bg" aria-hidden="true"></div>

<div class="lang">
  <select id="langSelect" aria-label="Language">
    <option value="en">EN</option>
    <option value="de">DE</option>
    <option value="pl">PL</option>
  </select>
</div>

<main>
  <div class="card">
    <span class="eyebrow">18+</span>
    <h1 id="h1Text"></h1>
    <p class="sub" id="subText"></p>

    <a href="/go" class="btn" id="ctaBtn">I’m 18+ — show me →</a>

    <p class="micro" id="microText">
      <span>Free to join</span>·<span>Verified</span>·<span>Real women 40+</span>
    </p>
  </div>
</main>

<footer>
  <span class="footer-copy" id="footerCopy">© 2026 VelvetMeet · 18+ only</span>
  <a href="/privacy.html" id="footerPrivacy">Privacy</a>·<a href="/terms.html" id="footerTerms">Terms</a>·<a href="/cookies.html" id="footerCookies">Cookies</a>·<a href="/impressum.html" id="footerImpressum">Impressum</a>
</footer>

<div class="cookie" id="cookieBar" role="status">
  <span id="cookieMsg">We use essential cookies only.</span>
  <button id="cookieOk">Got it</button>
</div>

<script>
// ========== VARIANT ROTATION ==========
// 3 headline variants per language, random on each page load
// Variant number passed to affiliate link as aff_sub4 for tracking

var VARIANTS = {
  en:{
    h1:[
      "She didn’t expect to start over at 52.",
      "Is it really too late to meet someone real?",
      "Her last message was three years ago."
    ],
    sub:[
      "We just need to know — are you 18 or older?",
      "We just need to know — are you 18 or older?",
      "We just need to know — are you 18 or older?"
    ]
  },
  de:{
    h1:[
      "Mit 52 hätte sie nicht gedacht, nochmal anzufangen.",
      "Ist es wirklich zu spät, jemanden Echten zu treffen?",
      "Ihre letzte Nachricht war vor drei Jahren."
    ],
    sub:[
      "Wir müssen nur wissen — bist du 18 oder älter?",
      "Wir müssen nur wissen — bist du 18 oder älter?",
      "Wir müssen nur wissen — bist du 18 oder älter?"
    ]
  },
  pl:{
    h1:[
      "W wieku 52 lat nie spodziewała się zaczynać od nowa.",
      "Czy naprawdę za późno, by poznać kogoś prawdziwego?",
      "Jej ostatnia wiadomość była trzy lata temu."
    ],
    sub:[
      "Musimy tylko wiedzieć — masz 18 lat lub więcej?",
      "Musimy tylko wiedzieć — masz 18 lat lub więcej?",
      "Musimy tylko wiedzieć — masz 18 lat lub więcej?"
    ]
  }
};

// Pick random variant index (0, 1, or 2)
var currentVariant = Math.floor(Math.random() * 3);

var I18N = {
  en:{
    htmlLang:"en",
    title:"VelvetMeet — 18+",
    cta:"I’m 18+ — show me →",
    micro:["Free to join","Verified","Real women 40+"],
    cookieMsg:"We use essential cookies only.",
    cookieOk:"Got it",
    footerCopy:"© 2026 VelvetMeet · 18+ only",
    footerPrivacy:"Privacy",footerTerms:"Terms",footerCookies:"Cookies",footerImpressum:"Impressum"
  },
  de:{
    htmlLang:"de",
    title:"VelvetMeet — 18+",
    cta:"Ich bin 18+ — zeig mir →",
    micro:["Kostenlos","Verifiziert","Echte Frauen 40+"],
    cookieMsg:"Wir verwenden nur notwendige Cookies.",
    cookieOk:"Verstanden",
    footerCopy:"© 2026 VelvetMeet · Nur 18+",
    footerPrivacy:"Datenschutz",footerTerms:"AGB",footerCookies:"Cookies",footerImpressum:"Impressum"
  },
  pl:{
    htmlLang:"pl",
    title:"VelvetMeet — 18+",
    cta:"Mam 18+ — pokaż mi →",
    micro:["Za darmo","Zweryfikowane","Prawdziwe kobiety 40+"],
    cookieMsg:"Używamy tylko niezbędnych cookies.",
    cookieOk:"Rozumiem",
    footerCopy:"© 2026 VelvetMeet · Tylko 18+",
    footerPrivacy:"Prywatność",footerTerms:"Regulamin",footerCookies:"Cookies",footerImpressum:"Dane firmy"
  }
};

var COUNTRY_LANG = {
  DE:"de",AT:"de",CH:"de",LI:"de",LU:"de",
  PL:"pl"
};

function detectLang(){
  var qs = new URLSearchParams(location.search);
  var qlang = qs.get("lang");
  if(qlang && I18N[qlang]) return qlang;

  try{
    var stored = localStorage.getItem("vm_lang");
    if(stored && I18N[stored]) return stored;
  }catch(e){}

  if(window.__VM_COUNTRY){
    var c = window.__VM_COUNTRY.toUpperCase();
    if(COUNTRY_LANG[c]) return COUNTRY_LANG[c];
  }

  var nav = (navigator.language || "en").toLowerCase().slice(0,2);
  if(I18N[nav]) return nav;

  return "en";
}

function applyLang(lang){
  var t = I18N[lang] || I18N.en;
  var v = VARIANTS[lang] || VARIANTS.en;
  
  document.getElementById("htmlRoot").lang = t.htmlLang;
  document.getElementById("docTitle").textContent = t.title;
  
  // Apply rotated headline and subtext
  document.getElementById("h1Text").textContent = v.h1[currentVariant];
  document.getElementById("subText").textContent = v.sub[currentVariant];
  
  document.getElementById("ctaBtn").textContent = t.cta;
  document.getElementById("microText").innerHTML =
    "<span>"+t.micro[0]+"</span>·<span>"+t.micro[1]+"</span>·<span>"+t.micro[2]+"</span>";
  document.getElementById("cookieMsg").textContent = t.cookieMsg;
  document.getElementById("cookieOk").textContent = t.cookieOk;
  document.getElementById("footerCopy").textContent = t.footerCopy;
  document.getElementById("footerPrivacy").textContent = t.footerPrivacy;
  document.getElementById("footerTerms").textContent = t.footerTerms;
  document.getElementById("footerCookies").textContent = t.footerCookies;
  document.getElementById("footerImpressum").textContent = t.footerImpressum;
  document.getElementById("langSelect").value = lang;

  try{ localStorage.setItem("vm_lang", lang); }catch(e){}
}

var currentLang = detectLang();
applyLang(currentLang);

document.getElementById("langSelect").addEventListener("change", function(e){
  applyLang(e.target.value);
});

// CTA click — pass variant number as aff_sub4 for A/B tracking
document.getElementById("ctaBtn").addEventListener("click", function(e){
  e.preventDefault();
  var s = new URLSearchParams(location.search).get("s") || "organic";
  s = s.replace(/[^a-zA-Z0-9_-]/g, "").slice(0, 40);
  // variant index passed as v (0,1,2) for tracking in partner stats
  var v = currentVariant;
  window.location.href = "/go?s=" + encodeURIComponent(s) + "&v=" + v;
});

// Cookie banner
(function(){
  var bar = document.getElementById("cookieBar");
  try{
    if(!localStorage.getItem("vm_cookie_ok")){
      setTimeout(function(){ bar.style.display = "flex"; }, 4000);
    }
  }catch(e){
    setTimeout(function(){ bar.style.display = "flex"; }, 4000);
  }
  document.getElementById("cookieOk").addEventListener("click", function(){
    bar.style.display = "none";
    try{ localStorage.setItem("vm_cookie_ok", "1"); }catch(e){}
  });
})();
</script>

</body>
</html>
